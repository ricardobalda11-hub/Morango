<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morango - Tienda Hogar</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f9f9f9; color: #1a1a1a; margin: 0; padding: 0; }
        
        header { 
            background-color: #111; 
            color: #fff; 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        header h1 { margin: 0; font-size: 2rem; font-weight: 300; letter-spacing: 4px; }
        nav a { color: #fff; margin-left: 20px; text-decoration: none; font-size: 0.9rem; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .featured { 
            background-image: url('https://images.unsplash.com/photo-1620626011761-996317b6979a?w=1200&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center; 
            text-align: center; 
            padding: 100px 20px; 
            margin-bottom: 30px; 
            border-radius: 6px; 
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .featured h2 { margin-top: 0; font-size: 2.5rem; font-weight: 500; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background-color: #fff; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .card img { width: 100%; height: 220px; object-fit: cover; filter: grayscale(100%); display: block; }
        .card-info { padding: 15px; text-align: center; background-color: #fff; }
        
        .menu { display: none; margin: 0; padding: 20px; background-color: #f6f6f6; border-top: 1px solid #eee; font-size: 0.95rem; color: #444; }
        .menu ul { margin: 0; padding-left: 20px; text-align: left; }
        
        .form-container { background-color: #fff; padding: 30px; margin-top: 50px; border: 1px solid #e0e0e0; border-radius: 6px; }
        form { display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        input, textarea { margin-bottom: 20px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 14px; background-color: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        
        .assistant-link { text-align: center; margin-top: 20px; display: block; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<header>
    <h1>MORANGO</h1>
    <nav>
        <a href="#categorias">Categorías</a>
        <a href="#lo-nuevo">Lo Nuevo</a>
        <a href="#contacto">Contacto</a>
    </nav>
</header>

<div class="container">
    <div class="featured">
        <h2>Sección Destacada: Lo nuevo en Morango</h2>
    </div>

    <div class="grid" id="categorias">
        <!-- Tarjetas de categorías aquí -->
    </div>

    <div class="form-container" id="contacto">
        <h3>Contacto y Registro de Clientes</h3>
        <form action="#" method="POST">
            <label for="name">Nombre Completo</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" required>
            <button type="submit">Enviar Información</button>
        </form>
    </div>
    
    <a href="#" class="assistant-link">Hablar con nuestro Asistente Virtual</a>
</div>

</body>
</html>
