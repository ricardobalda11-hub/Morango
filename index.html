<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morango - Productos para el Hogar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        header {
            background-color: #ff6f61;
            color: white;
            padding: 1em 0;
            text-align: center;
        }
        nav {
            background-color: #ffb6b6;
            display: flex;
            justify-content: center;
            padding: 0.5em 0;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .product {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .product img {
            max-width: 100%;
            border-radius: 8px;
        }
        .product h3 {
            margin: 10px 0 5px 0;
        }
        .product a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #ff6f61;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Morango</h1>
        <p>Productos para el Hogar</p>
    </header>

    <nav>
        <a href="#dormitorio">Dormitorio</a>
